# ============================================================
# DEPORTEData — docker-compose.yml
#
# Despliega el backend desde GHCR.
# La versión de la imagen se controla desde .env (BACKEND_IMAGE_TAG)
#
# Uso:
#   sudo docker compose pull
#   sudo docker compose up -d
#
# Sprint 4: descomentar los servicios de Ollama y ChromaDB para RAG.
# ============================================================

services:

  # ── Backend (FastAPI + Spark submit) ──────────
  backend:
    image: ghcr.io/criscros/deportedata/backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: deportedata-backend
    network_mode: host
    env_file: .env
    restart: unless-stopped
