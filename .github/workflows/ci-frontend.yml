name: CI Frontend

on:
  push:
    tags:
      - 'frontend_*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: criscros/deportedata/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#frontend_}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ success() }}
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT }}
      EC2_FRONTEND_PATH: ${{ secrets.EC2_FRONTEND_PATH }}
      FRONTEND_VERSION: ${{ needs.build-and-push.outputs.version }}

    steps:
      - name: Validate deploy secrets
        shell: bash
        run: |
          set -eu
          required=(EC2_HOST EC2_USER EC2_FRONTEND_PATH)
          for var in "${required[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var"
              exit 1
            fi
          done

      - name: Prepare SSH key
        shell: bash
        run: |
          set -eu
          mkdir -p ~/.ssh
          cat > ~/.ssh/ec2_key <<'KEY'
          ${{ secrets.EC2_SSH_KEY }}
          KEY
          sed -i 's/\\n/\n/g' ~/.ssh/ec2_key
          tr -d '\r' < ~/.ssh/ec2_key > ~/.ssh/ec2_key.tmp
          mv ~/.ssh/ec2_key.tmp ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          if [ ! -s ~/.ssh/ec2_key ]; then
            echo "Missing required secret: EC2_SSH_KEY"
            exit 1
          fi
          ssh-keyscan -p "${EC2_PORT:-22}" "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy frontend to EC2
        shell: bash
        run: |
          set -eu
          ssh -i ~/.ssh/ec2_key -p "${EC2_PORT:-22}" "${EC2_USER}@${EC2_HOST}" <<EOF
          set -eu
          cd "${EC2_FRONTEND_PATH}"
          sed -i "s/^FRONTEND_IMAGE_TAG=.*/FRONTEND_IMAGE_TAG=${FRONTEND_VERSION}/" .env
          sudo docker compose pull
          sudo docker compose up -d
          sudo docker compose ps
          EOF
