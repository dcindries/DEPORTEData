name: ia-service · build & publish

# El prefijo de tag `ia-service_v*` evita colisiones en monorepo

on:
  push:
    tags:
      - 'ia-service_v*.*.*'
    branches:
      - develop
    paths:
      - 'ia-service/**'
      - '.github/workflows/ia-service.yml'
  pull_request:
    paths:
      - 'ia-service/**'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Publicar imagen en GHCR'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  # Namespace scoped: ghcr.io/CrisCros/deportedata/ia-service
  IMAGE_NAME: ${{ github.repository_owner }}/deportedata/ia-service

jobs:
  lint:
    name: Lint + syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ia-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ia-service/requirements.txt'

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9
          # Solo deps livianas para que los imports compilen.
          # NO instalamos torch/detoxify en el lint (pesan ~2 GB y no hace falta).
          pip install fastapi "pydantic-settings>=2.2" httpx chromadb

      - name: Lint (ruff check)
        run: ruff check app/

      - name: Format check (ruff format --check)
        run: ruff format --check app/

      - name: Syntax compile
        run: python -m compileall -q app/

  build:
    name: Build & push (${{ matrix.platform }})
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: >-
          (github.event_name == 'push' && (
            startsWith(github.ref, 'refs/tags/ia-service-v') ||
            github.ref == 'refs/heads/develop'
          )) ||
          (github.event_name == 'workflow_dispatch' && inputs.push_image)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag 'latest' solo en semver del módulo
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/ia-service-v') }}
            # Semver limpio desde el tag: ia-service-v1.2.3 → 1.2.3, 1.2, 1
            type=match,pattern=ia-service-v(.*),group=1,enable=${{ startsWith(github.ref, 'refs/tags/ia-service-v') }}
            type=match,pattern=ia-service-v(\d+\.\d+)\.\d+,group=1,enable=${{ startsWith(github.ref, 'refs/tags/ia-service-v') }}
            type=match,pattern=ia-service-v(\d+)\.\d+\.\d+,group=1,enable=${{ startsWith(github.ref, 'refs/tags/ia-service-v') }}
            # Rama develop → tag 'develop' + SHA corto
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,prefix=develop-,enable=${{ github.ref == 'refs/heads/develop' }}
            # PRs: solo validación, sin push
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=DEPORTEData IA Service
            org.opencontainers.image.description=Moderación + RAG + LLM para /chat
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./ia-service
          file: ./ia-service/Dockerfile
          platforms: ${{ matrix.platform }}
          push: >-
            ${{
              (github.event_name == 'push' && (
                startsWith(github.ref, 'refs/tags/ia-service-v') ||
                github.ref == 'refs/heads/develop'
              )) ||
              (github.event_name == 'workflow_dispatch' && inputs.push_image)
            }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ia-service
          cache-to: type=gha,mode=max,scope=ia-service

      - name: Image digest summary
        run: |
          echo "### Imagen publicada" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  release-notes:
    name: Release notes (solo en tag)
    if: startsWith(github.ref, 'refs/tags/ia-service-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ia-service ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
